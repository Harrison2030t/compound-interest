
<style>
  .ctrl { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .ctrl label { font-size: 13px; color: var(--color-text-secondary); min-width: 80px; }
  .ctrl input[type=range] { flex: 1; }
  .ctrl .val { font-size: 14px; font-weight: 500; min-width: 56px; text-align: right; color: var(--color-text-primary); }
  .cards { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin: 1.5rem 0; }
  .card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .card-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .card-value { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .card-value.highlight { color: #1D9E75; }
  .tip { font-size: 13px; color: var(--color-text-secondary); margin-top: 1rem; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 1rem; }
</style>

<div style="padding: 1rem 0;">
  <div class="ctrl">
    <label>초기 투자금</label>
    <input type="range" id="principal" min="100" max="10000" step="100" value="1000">
    <span class="val" id="p-out">₩1,000</span>
  </div>
  <div class="ctrl">
    <label>연 수익률</label>
    <input type="range" id="rate" min="1" max="20" step="0.5" value="7">
    <span class="val" id="r-out">7%</span>
  </div>
  <div class="ctrl">
    <label>투자 기간</label>
    <input type="range" id="years" min="1" max="40" step="1" value="20">
    <span class="val" id="y-out">20년</span>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-label">원금</div>
      <div class="card-value" id="c-principal">₩1,000</div>
    </div>
    <div class="card">
      <div class="card-label">단순 이자 합계</div>
      <div class="card-value" id="c-simple">₩2,400</div>
    </div>
    <div class="card">
      <div class="card-label">복리 합계</div>
      <div class="card-value highlight" id="c-compound">₩3,870</div>
    </div>
  </div>

  <div style="position: relative; width: 100%; height: 260px;">
    <canvas id="chart"></canvas>
  </div>

  <div class="tip" id="tip-text"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const fmt = n => '₩' + Math.round(n).toLocaleString('ko-KR');

  let chartInst = null;

  function compute() {
    const P = +document.getElementById('principal').value;
    const r = +document.getElementById('rate').value / 100;
    const Y = +document.getElementById('years').value;

    document.getElementById('p-out').textContent = fmt(P);
    document.getElementById('r-out').textContent = (+document.getElementById('rate').value).toFixed(1) + '%';
    document.getElementById('y-out').textContent = Y + '년';

    const compoundFinal = P * Math.pow(1 + r, Y);
    const simpleFinal = P + P * r * Y;

    document.getElementById('c-principal').textContent = fmt(P);
    document.getElementById('c-simple').textContent = fmt(simpleFinal);
    document.getElementById('c-compound').textContent = fmt(compoundFinal);

    const labels = [];
    const compoundData = [];
    const simpleData = [];
    const principalData = [];
    for (let y = 0; y <= Y; y++) {
      labels.push(y + '년');
      compoundData.push(Math.round(P * Math.pow(1 + r, y)));
      simpleData.push(Math.round(P + P * r * y));
      principalData.push(P);
    }

    const diff = Math.round(compoundFinal - simpleFinal);
    const ratio = (compoundFinal / P).toFixed(1);
    document.getElementById('tip-text').textContent =
      `복리 효과로 단순 이자보다 ${fmt(diff)} 더 많습니다. 원금 대비 ${ratio}배 성장.`;

    if (chartInst) chartInst.destroy();
    chartInst = new Chart(document.getElementById('chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '복리',
            data: compoundData,
            borderColor: '#1D9E75',
            backgroundColor: 'rgba(29,158,117,0.08)',
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
            tension: 0.3
          },
          {
            label: '단순 이자',
            data: simpleData,
            borderColor: '#888780',
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
            borderDash: [4, 3],
            tension: 0
          },
          {
            label: '원금',
            data: principalData,
            borderColor: '#B4B2A9',
            borderWidth: 1,
            pointRadius: 0,
            fill: false,
            borderDash: [2, 4],
            tension: 0
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y)
            }
          }
        },
        scales: {
          x: {
            ticks: { maxTicksLimit: 8, autoSkip: true, color: '#888780', font: { size: 11 } },
            grid: { color: 'rgba(136,135,128,0.15)' }
          },
          y: {
            ticks: {
              color: '#888780',
              font: { size: 11 },
              callback: v => '₩' + (v >= 1000000 ? (v/1000000).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(0)+'K' : v)
            },
            grid: { color: 'rgba(136,135,128,0.15)' }
          }
        }
      }
    });
  }

  ['principal','rate','years'].forEach(id => {
    document.getElementById(id).addEventListener('input', compute);
  });

  compute();
</script>
